<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="container">
      <h1>Twitch Flow Chat</h1>

      <div class="field">
        <label for="visibility">表示</label>
        <select id="visibility">
          <option value="visible">ON</option>
          <option value="hidden">OFF</option>
        </select>
      </div>

      <div class="field">
        <label for="color">コメント色</label>
        <input type="color" id="color" />
      </div>

      <div class="field">
        <label for="outlineColor">縁取り色</label>
        <input type="color" id="outlineColor" />
      </div>

      <div class="field">
        <label for="outlineSize">縁取りサイズ (px)</label>
        <input type="number" id="outlineSize" min="0" max="10" step="1" />
      </div>

      <div class="field">
        <label for="opacity">不透明度</label>
        <input type="range" id="opacity" min="0" max="1" step="0.1" />
        <span id="opacityValue"></span>
      </div>

      <div class="field">
        <label for="fontFamily">フォント</label>
        <input type="text" id="fontFamily" placeholder="sans-serif, Impact" />
      </div>

      <div class="field">
        <label for="fontSizeMode">フォントサイズ算出モード</label>
        <select id="fontSizeMode">
          <option value="Auto">Auto (自動計算)</option>
          <option value="Custom">Custom (固定サイズ)</option>
        </select>
      </div>

      <div class="field" id="customFontSizeField">
        <label for="customFontSize">フォントサイズ</label>
        <input type="text" id="customFontSize" placeholder="32px, 1.5em" />
      </div>

      <div class="field">
        <label for="displayLines">表示最大行数</label>
        <input type="number" id="displayLines" min="1" max="50" />
      </div>

      <div class="field">
        <label for="anchorPosition">コメント表示エリア アンカー位置</label>
        <select id="anchorPosition">
          <option value="Center">Center (中央)</option>
          <option value="Top">Top (上部)</option>
          <option value="Bottom">Bottom (下部)</option>
        </select>
      </div>

      <div class="field">
        <label for="duration">スクロール秒数</label>
        <input type="number" id="duration" min="1" max="20" step="0.5" />
      </div>

      <div class="field checkbox">
        <input type="checkbox" id="showBadges" />
        <label for="showBadges">バッジを表示</label>
      </div>

      <div class="field checkbox">
        <input type="checkbox" id="showUsername" />
        <label for="showUsername">ユーザー名を表示</label>
      </div>

      <div class="field checkbox">
        <input type="checkbox" id="useUserColor" />
        <label for="useUserColor">ユーザー名に色を付ける</label>
      </div>

      <div class="field checkbox">
        <input type="checkbox" id="enableQueue" />
        <label for="enableQueue">溢れたコメントをストック</label>
      </div>

      <div class="footer">
        <button id="reset">デフォルトに戻す</button>
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
