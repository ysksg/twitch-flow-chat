<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="container">
      <h1 data-i18n="title">Twitch Flow Chat</h1>

      <div class="field">
        <label for="language" data-i18n="language">言語</label>
        <select id="language">
          <option value="ja">日本語</option>
          <option value="en">English</option>
        </select>
      </div>

      <div class="section-title" data-i18n="displaySettings">表示設定</div>

      <div class="field">
        <label for="visibility" data-i18n="visibility">表示</label>
        <select id="visibility">
          <option value="visible">ON</option>
          <option value="hidden">OFF</option>
        </select>
      </div>

      <div class="field">
        <label for="color" data-i18n="commentColor">コメント色</label>
        <input type="color" id="color" />
      </div>

      <div class="field">
        <label for="outlineColor" data-i18n="outlineColor">縁取り色</label>
        <input type="color" id="outlineColor" />
      </div>

      <div class="field">
        <label for="outlineSize" data-i18n="outlineSize">縁取りサイズ (px)</label>
        <input type="number" id="outlineSize" min="0" max="10" step="1" />
      </div>

      <div class="field">
        <label for="opacity" data-i18n="opacity">不透明度</label>
        <input type="range" id="opacity" min="0" max="1" step="0.1" />
        <span id="opacityValue"></span>
      </div>

      <div class="field">
        <label for="fontFamily" data-i18n="fontFamily">フォント</label>
        <input type="text" id="fontFamily" placeholder="sans-serif, Impact" />
      </div>

      <div class="field">
        <label for="fontSizeMode" data-i18n="fontSizeMode">フォントサイズ算出モード</label>
        <select id="fontSizeMode">
          <option value="Auto">Auto (自動計算)</option>
          <option value="Custom">Custom (固定サイズ)</option>
        </select>
      </div>

      <div class="field" id="customFontSizeField">
        <label for="customFontSize" data-i18n="fontSize">フォントサイズ</label>
        <input type="text" id="customFontSize" placeholder="32px, 1.5em" />
      </div>

      <div class="field">
        <label for="displayLines" data-i18n="maxLines">表示最大行数</label>
        <input type="number" id="displayLines" min="1" max="50" />
      </div>

      <div class="field">
        <label for="anchorPosition" data-i18n="anchorPosition">コメント表示エリア アンカー位置</label>
        <select id="anchorPosition">
          <option value="Center">Center (中央)</option>
          <option value="Top">Top (上部)</option>
          <option value="Bottom">Bottom (下部)</option>
        </select>
      </div>

      <div class="field">
        <label for="duration" data-i18n="scrollDuration">スクロール秒数</label>
        <input type="number" id="duration" min="1" max="20" step="0.5" />
      </div>

      <div class="field checkbox">
        <input type="checkbox" id="showBadges" />
        <label for="showBadges" data-i18n="showBadges">バッジを表示</label>
      </div>

      <div class="field checkbox">
        <input type="checkbox" id="showUsername" />
        <label for="showUsername" data-i18n="showUsername">ユーザー名を表示</label>
      </div>

      <div class="field checkbox">
        <input type="checkbox" id="useUserColor" />
        <label for="useUserColor" data-i18n="useUserColor">ユーザー名に色を付ける</label>
      </div>

      <div class="field checkbox">
        <input type="checkbox" id="enableQueue" />
        <label for="enableQueue" data-i18n="enableQueue">溢れたコメントをストック</label>
      </div>

      <div class="field checkbox">
        <input type="checkbox" id="enableMultiLayer" />
        <label for="enableMultiLayer" data-i18n="enableMultiLayer">レーン満杯時に隙間に強制表示</label>
      </div>

      <div class="section-title" data-i18n="ttsSettings">音声読み上げ（TTS）機能</div>

      <div class="field checkbox">
        <input type="checkbox" id="ttsEnabled" />
        <label for="ttsEnabled" data-i18n="ttsEnabled">音声読み上げ機能を有効にする</label>
      </div>

      <div class="field">
        <label for="ttsVoice" data-i18n="ttsVoice">読み上げ音声</label>
        <div class="tts-voice-container">
          <select id="ttsVoice">
            <option value="" data-i18n="loading">(読み込み中...)</option>
          </select>
          <button id="ttsSpeakSample" data-i18n="ttsSample" title="サンプル再生">
            <svg viewBox="0 0 24 24" width="14" height="14" style="vertical-align: middle;"><path fill="currentColor" d="M8 5l11 7-11 7V5z"/></svg>
          </button>
        </div>
      </div>

      <div class="field">
        <label for="ttsVolume" data-i18n="ttsVolume">音量 (0.0 ~ 1.0)</label>
        <input type="number" id="ttsVolume" min="0.0" max="1.0" step="0.1" />
      </div>

      <div class="field">
        <label for="ttsSpeed" data-i18n="ttsSpeed">基本速度 (0.1 ~ 3.0)</label>
        <input type="number" id="ttsSpeed" min="0.1" max="3.0" step="0.1" />
      </div>

      <div class="field">
        <label for="ttsMaxQueue" data-i18n="ttsMaxQueue">読み上げ待ちの最大許容数</label>
        <input type="number" id="ttsMaxQueue" min="1" max="50" step="1" />
      </div>

      <div class="field checkbox">
        <input type="checkbox" id="ttsAutoSpeed" />
        <label for="ttsAutoSpeed" data-i18n="ttsAutoSpeed">コメント量に応じて速度を上げる</label>
      </div>

      <div class="footer">
        <button id="reset" data-i18n="reset">デフォルトに戻す</button>
      </div>
    </div>
    <script src="i18n.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
